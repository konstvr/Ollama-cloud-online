<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ollama Gateway</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: #000000;
            color: #f5f5f7;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
        }
        .container {
            width: 100%;
            max-width: 600px;
            background: #1c1c1e;
            border-radius: 14px;
            padding: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            box-sizing: border-box;
        }
        h2 { margin-top: 0; text-align: center; font-weight: 600; }
        .field {
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
        }
        label {
            font-size: 0.75rem;
            font-weight: 700;
            margin-bottom: 6px;
            text-transform: uppercase;
            color: #a1a1a6;
        }
        input, textarea {
            padding: 12px;
            border: 1px solid #3a3a3c;
            border-radius: 8px;
            font-size: 1rem;
            background: #2c2c2e;
            color: #ffffff;
            outline: none;
        }
        input:focus, textarea:focus { border-color: #0a84ff; }
        button {
            background-color: #0a84ff;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
        }
        button:disabled { opacity: 0.4; }
        #responseArea {
            margin-top: 15px;
            padding: 15px;
            border-radius: 8px;
            background: #2c2c2e;
            border: 1px solid #3a3a3c;
            min-height: 80px;
            white-space: pre-wrap;
            line-height: 1.4;
        }
        .console {
            margin-top: 20px;
            background: #151515;
            border-radius: 8px;
            padding: 12px;
            border: 1px solid #222;
        }
        .console-header {
            color: #ff9500;
            font-size: 0.7rem;
            font-weight: bold;
            text-transform: uppercase;
            margin-bottom: 6px;
        }
        #sysLogs {
            font-family: Menlo, Courier, monospace;
            font-size: 0.75rem;
            color: #00ff66;
            max-height: 140px;
            overflow-y: auto;
            margin: 0;
            white-space: pre-wrap;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Ollama Cloud Gateway</h2>
    
    <div class="field">
        <label>Ollama API Token</label>
        <input type="password" id="cloudKey" placeholder="OLLAMA_API_KEY">
    </div>

    <div class="field">
        <label>Prompt</label>
        <textarea id="userPrompt" rows="4" placeholder="Ask gemma4:31b anything..."></textarea>
    </div>

    <button id="runBtn" onclick="sendRequest()">Query Cloud Model</button>

    <label style="display:block; margin-top:20px;">Output Response</label>
    <div id="responseArea">Awaiting live session...</div>

    <div class="console">
        <div class="console-header">📡 Web Deployment Monitor</div>
        <pre id="sysLogs">Initialized. Ready for input.</pre>
    </div>
</div>

<script>
    // Pull saved token from storage if present
    document.getElementById('cloudKey').value = localStorage.getItem('clean_ollama_key') || '';

    function printLog(text, isError = false) {
        const consoleElem = document.getElementById('sysLogs');
        const time = new Date().toLocaleTimeString();
        consoleElem.textContent += `\n[${time}] ${isError ? '[❌ ERROR]' : '[LOG]'} ${text}`;
        consoleElem.scrollTop = consoleElem.scrollHeight;
    }

    async function sendRequest() {
        const apiKey = document.getElementById('cloudKey').value.trim();
        const prompt = document.getElementById('userPrompt').value.trim();
        const btn = document.getElementById('runBtn');
        const output = document.getElementById('responseArea');

        if (!apiKey || !prompt) {
            alert('Please enter both your API Key and a Prompt.');
            return;
        }

        localStorage.setItem('clean_ollama_key', apiKey);
        btn.disabled = true;
        output.textContent = "Connecting directly to Ollama Cloud API...";
        
        printLog("Assembling direct payload for gemma4:31b...");

        // Direct fetch call without using a proxy tunnel
        try {
            printLog("Dispatching fetch request directly to ollama.com...");
            const response = await fetch('https://ollama.com/api/chat', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${apiKey}`
                },
                body: JSON.stringify({
                    model: 'gemma4:31b',
                    messages: [{ role: 'user', content: prompt }],
                    stream: false
                })
            });

            printLog(`Server responded with status: ${response.status}`);
            const textData = await response.text();

            if (!response.ok) {
                printLog(`Server error payload: ${textData}`, true);
                throw new Error(`HTTP ${response.status}`);
            }

            const json = JSON.parse(textData);
            if (json.message && json.message.content) {
                output.textContent = json.message.content;
                printLog("Success! Output written to view.");
            } else {
                output.textContent = JSON.stringify(json, null, 2);
                printLog("Warning: Returned alternative JSON layout structure.");
            }

        } catch (err) {
            printLog(`Crashed: ${err.toString()}`, true);
            output.innerHTML = `<span style="color:#ff453a; font-weight:bold;">Load Failed.</span> See network errors below.`;
        } finally {
            btn.disabled = false;
        }
    }
</script>

</body>
</html>
